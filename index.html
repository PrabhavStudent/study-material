<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://www.youtube-nocookie.com">
<link rel="preconnect" href="https://www.google.com">
<link rel="preconnect" href="https://i.ytimg.com">
<link rel="preconnect" href="https://s.ytimg.com" crossorigin>
<link rel="dns-prefetch" href="https://www.youtube-nocookie.com">
<title>DSA Video Vault</title>
<style>
  :root{
    --bg:#f7f6f3;
    --surface:#ffffff;
    --border:#e7e4dd;
    --text:#1f1d1a;
    --text-soft:#6b6863;
    --accent:#d97757;
    --accent-soft:#f3e3dc;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 14px rgba(0,0,0,0.04);
    --radius:14px;
  }
  [data-theme="dark"]{
    --bg:#15140f;
    --surface:#1d1c17;
    --border:#302e27;
    --text:#f2efe9;
    --text-soft:#a49f95;
    --accent:#e08a63;
    --accent-soft:#3a2a22;
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 6px 20px rgba(0,0,0,0.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    transition: background .3s ease, color .3s ease;
    min-height:100vh;
  }
  header{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 28px;
    background:var(--bg);
    border-bottom:1px solid var(--border);
    transition:background .3s ease, border-color .3s ease;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);}
  .brand h1{font-size:17px; margin:0; font-weight:600; letter-spacing:-0.01em;}
  .brand span{color:var(--text-soft); font-weight:400; font-size:13px; display:block; margin-top:1px;}

  .toggle-btn{
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text);
    width:42px; height:42px;
    border-radius:50%;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: all .25s ease;
    box-shadow:var(--shadow);
  }
  .toggle-btn:hover{ border-color:var(--accent); transform:scale(1.05); }
  .toggle-btn svg{width:19px;height:19px;}

  main{ max-width:1080px; margin:0 auto; padding:40px 24px 80px; }

  .search-wrap{ margin-bottom:34px; }
  .search-wrap input{
    width:100%;
    padding:14px 18px;
    font-size:15px;
    border-radius:12px;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text);
    outline:none;
    transition: border-color .2s ease, box-shadow .2s ease;
  }
  .search-wrap input:focus{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }

  .category{ margin-bottom:38px; }
  .category-title{
    display:flex; align-items:center; gap:10px;
    font-size:13px; text-transform:uppercase; letter-spacing:.08em;
    color:var(--text-soft); font-weight:600;
    margin-bottom:14px;
  }
  .category-title::after{
    content:""; flex:1; height:1px; background:var(--border);
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(250px,1fr));
    gap:14px;
  }

  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:18px;
    box-shadow:var(--shadow);
    transition: transform .2s ease, border-color .2s ease;
  }
  .card:hover{ transform:translateY(-2px); border-color:var(--accent); }
  .card h3{ margin:0 0 12px; font-size:15px; font-weight:600; letter-spacing:-0.01em; display:flex; align-items:center; gap:6px; }
  .note-dot{ width:6px; height:6px; border-radius:50%; background:var(--accent); flex-shrink:0; }

  .video-btns{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px; }
  .video-btn{
    border:1px solid var(--border);
    background:var(--bg);
    color:var(--text);
    font-size:13px;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    display:flex; align-items:center; gap:6px;
    transition: all .2s ease;
  }
  .video-btn:hover{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .video-btn svg{width:13px;height:13px;}

  .util-row{ display:flex; flex-wrap:wrap; gap:8px; padding-top:8px; border-top:1px dashed var(--border); }
  .util-btn{
    border:1px solid transparent;
    background:transparent;
    color:var(--text-soft);
    font-size:12.5px;
    padding:6px 2px;
    cursor:pointer;
    display:flex; align-items:center; gap:5px;
    transition: color .2s ease;
    text-decoration:none;
  }
  .util-btn:hover{ color:var(--accent); }
  .util-btn svg{ width:14px; height:14px; }

  .hidden{ display:none !important; }

  /* Video Modal */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.6);
    display:flex; align-items:center; justify-content:center;
    z-index:100; padding:24px;
    opacity:0; pointer-events:none;
    transition:opacity .25s ease;
  }
  .modal-overlay.open{ opacity:1; pointer-events:auto; }
  .modal-box{
    background:#000;
    width:100%; max-width:860px;
    border-radius:16px;
    overflow:hidden;
    position:relative;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    transform:scale(.96);
    transition:transform .25s ease;
  }
  .modal-overlay.open .modal-box{ transform:scale(1); }
  .modal-box .frame-wrap{ position:relative; width:100%; padding-top:56.25%; }
  .modal-box iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; opacity:0; transition:opacity .3s ease; }
  .modal-box iframe.loaded{ opacity:1; }
  .spinner{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:13px; gap:10px; flex-direction:column;
  }
  .spinner .ring{
    width:32px; height:32px; border-radius:50%;
    border:3px solid rgba(255,255,255,0.2); border-top-color:var(--accent);
    animation:spin .8s linear infinite;
  }
  .spinner.hidden{ display:none; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .modal-close{
    position:absolute; top:10px; right:10px; z-index:5;
    width:34px; height:34px; border-radius:50%;
    background:rgba(0,0,0,0.55); color:#fff; border:none;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:18px;
  }
  .modal-close:hover{ background:rgba(0,0,0,0.8); }

  /* Notes Modal */
  .notes-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.55);
    display:flex; align-items:flex-start; justify-content:center;
    z-index:100; padding:30px 20px;
    opacity:0; pointer-events:none;
    transition:opacity .25s ease;
    overflow-y:auto;
  }
  .notes-overlay.open{ opacity:1; pointer-events:auto; }
  .notes-box{
    background:var(--surface);
    width:100%; max-width:820px;
    border-radius:16px;
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
    transform:scale(.97) translateY(6px);
    transition:transform .25s ease;
    overflow:hidden;
  }
  .notes-overlay.open .notes-box{ transform:scale(1) translateY(0); }
  .notes-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px; border-bottom:1px solid var(--border);
  }
  .notes-head h2{ margin:0; font-size:16px; font-weight:600; }
  .notes-head .save-status{ font-size:12px; color:var(--text-soft); }
  .notes-close{
    background:none; border:none; color:var(--text-soft); font-size:20px;
    cursor:pointer; line-height:1; padding:4px;
  }
  .notes-close:hover{ color:var(--accent); }

  .notes-tabs{ display:flex; gap:4px; padding:12px 20px 0; }
  .notes-tab{
    padding:8px 16px; border-radius:8px 8px 0 0; cursor:pointer;
    font-size:13px; font-weight:600; color:var(--text-soft);
    border:1px solid transparent;
  }
  .notes-tab.active{ color:var(--accent); border-color:var(--border); border-bottom-color:var(--surface); background:var(--surface); position:relative; top:1px; }

  .notes-body{ padding:16px 20px 20px; }
  .notes-pane{ display:none; }
  .notes-pane.active{ display:block; }

  #notesText{
    width:100%; min-height:220px; resize:vertical;
    border:1px solid var(--border); border-radius:10px;
    background:var(--bg); color:var(--text);
    padding:12px 14px; font-size:14px; line-height:1.55;
    font-family:inherit; outline:none;
  }
  #notesText:focus{ border-color:var(--accent); }

  .draw-toolbar{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
  .draw-toolbar input[type=color]{
    width:32px; height:32px; border-radius:8px; border:1px solid var(--border);
    padding:0; cursor:pointer; background:none;
  }
  .draw-toolbar input[type=range]{ width:90px; }
  .tool-btn{
    border:1px solid var(--border); background:var(--bg); color:var(--text);
    font-size:12.5px; padding:7px 11px; border-radius:8px; cursor:pointer;
  }
  .tool-btn.active{ border-color:var(--accent); color:var(--accent); }
  .tool-btn:hover{ border-color:var(--accent); }

  .canvas-wrap{
    border:1px solid var(--border); border-radius:10px; overflow:auto;
    max-height:60vh; background:#fff;
  }
  #notesCanvas{ display:block; touch-action:none; cursor:crosshair; }

  .expand-row{ display:flex; justify-content:center; margin-top:10px; }
  .expand-btn{
    border:1px dashed var(--border); background:transparent; color:var(--text-soft);
    font-size:12.5px; padding:6px 14px; border-radius:20px; cursor:pointer;
  }
  .expand-btn:hover{ border-color:var(--accent); color:var(--accent); }

  footer{
    text-align:center; padding:30px 20px 50px;
    color:var(--text-soft); font-size:12px;
  }

  @media (max-width:520px){
    header{ padding:14px 18px; }
    main{ padding:26px 16px 60px; }
    .draw-toolbar{ gap:6px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-dot"></div>
    <div>
      <h1>DSA Video Vault</h1>
      <span>Your curated problem-solving playlist</span>
    </div>
  </div>
  <button class="toggle-btn" id="themeToggle" aria-label="Toggle dark mode">
    <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="4"></circle>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
    </svg>
    <svg id="iconMoon" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>
</header>

<main>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search a topic or problem, e.g. Binary Search, Coin Change...">
  </div>
  <div id="content"></div>
</main>

<footer>Built for focused DSA revision · videos play right here · notes save to this browser</footer>

<!-- Video Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="frame-wrap">
      <div class="spinner" id="modalSpinner"><div class="ring"></div><span>Loading video…</span></div>
      <iframe id="modalFrame" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
    <a id="modalFallback" href="#" target="_blank" style="display:block; text-align:center; padding:10px; background:#111; color:#aaa; font-size:12px; text-decoration:none;">Video not loading? Open on YouTube instead ↗</a>
  </div>
</div>

<!-- Notes Modal -->
<div class="notes-overlay" id="notesOverlay">
  <div class="notes-box">
    <div class="notes-head">
      <h2 id="notesTitle">Notes</h2>
      <div style="display:flex; align-items:center; gap:14px;">
        <span class="save-status" id="saveStatus">Saved</span>
        <button class="notes-close" id="notesClose">&times;</button>
      </div>
    </div>
    <div class="notes-tabs">
      <div class="notes-tab active" data-tab="text" id="tabText">Text</div>
      <div class="notes-tab" data-tab="draw" id="tabDraw">Draw</div>
    </div>
    <div class="notes-body">
      <div class="notes-pane active" id="paneText">
        <textarea id="notesText" placeholder="Write your notes for this problem here — approach, edge cases, complexity, gotchas..."></textarea>
      </div>
      <div class="notes-pane" id="paneDraw">
        <div class="draw-toolbar">
          <input type="color" id="penColor" value="#1f1d1a">
          <label style="font-size:12px; color:var(--text-soft); display:flex; align-items:center; gap:6px;">Size <input type="range" id="penSize" min="1" max="20" value="3"></label>
          <button class="tool-btn active" id="toolPen">✏️ Pen</button>
          <button class="tool-btn" id="toolEraser">🧹 Eraser</button>
          <button class="tool-btn" id="toolClear">Clear</button>
        </div>
        <div class="canvas-wrap" id="canvasWrap">
          <canvas id="notesCanvas" width="740" height="360"></canvas>
        </div>
        <div class="expand-row">
          <button class="expand-btn" id="expandCanvas">+ Expand canvas</button>
        </div>
      </div>
    </div>
  </div>
</div>

tps://youtu.be/ayPCTWjpabU?si=Ymp6cTOcQOCyaMwx"], "neetcode": "https://neetcode.io/problems/meeting-schedule"}]}];

function slugify(str){
  return str.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
}

function getYoutubeId(url){
  try{
    const u = new URL(url);
    if(u.hostname.includes('youtu.be')){
      return u.pathname.split('/').filter(Boolean)[0];
    }
    if(u.pathname.includes('/shorts/')){
      return u.pathname.split('/shorts/')[1].split('/')[0];
    }
    if(u.searchParams.get('v')){
      return u.searchParams.get('v');
    }
    const parts = u.pathname.split('/').filter(Boolean);
    return parts[parts.length-1];
  }catch(e){ return null; }
}

function playIcon(){
  return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg>';
}
function noteIcon(){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>';
}
function linkIcon(){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.07 0l2.83-2.83a5 5 0 0 0-7.07-7.07l-1.5 1.5"></path><path d="M14 11a5 5 0 0 0-7.07 0L4.1 13.83a5 5 0 0 0 7.07 7.07l1.5-1.5"></path></svg>';
}

function hasNotes(id){
  const t = localStorage.getItem('dsa-note-text:' + id);
  const d = localStorage.getItem('dsa-note-draw:' + id);
  return !!(t && t.trim()) || !!d;
}

function render(filter=''){
  content.innerHTML = '';
  const q = filter.trim().toLowerCase();

  DATA.forEach(cat => {
    const problems = cat.problems.filter(p =>
      !q || p.title.toLowerCase().includes(q) || cat.category.toLowerCase().includes(q)
    );
    if(problems.length === 0) return;

    const section = document.createElement('div');
    section.className = 'category';

    const title = document.createElement('div');
    title.className = 'category-title';
    title.textContent = cat.category;
    section.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'grid';

    problems.forEach(p => {
      const id = slugify(cat.category + '-' + p.title);
      const card = document.createElement('div');
      card.className = 'card';

      const h3 = document.createElement('h3');
      h3.innerHTML = (hasNotes(id) ? '<span class="note-dot" title="Has notes"></span>' : '') + '<span>' + p.title + '</span>';
      card.appendChild(h3);

      const btnWrap = document.createElement('div');
      btnWrap.className = 'video-btns';

      p.videos.forEach((url, idx) => {
        const vid = getYoutubeId(url);
        if(!vid) return;
        const btn = document.createElement('button');
        btn.className = 'video-btn';
        btn.innerHTML = playIcon() + '<span>' + (p.videos.length > 1 ? 'Video ' + (idx+1) : 'Watch') + '</span>';
        btn.addEventListener('click', () => openModal(vid));
        btnWrap.appendChild(btn);
      });

      card.appendChild(btnWrap);

      const utilRow = document.createElement('div');
      utilRow.className = 'util-row';

      const notesBtn = document.createElement('button');
      notesBtn.className = 'util-btn';
      notesBtn.innerHTML = noteIcon() + '<span>Notes</span>';
      notesBtn.addEventListener('click', () => openNotes(id, p.title, card, h3));
      utilRow.appendChild(notesBtn);

      if(p.neetcode){
        const ncLink = document.createElement('a');
        ncLink.className = 'util-btn';
        ncLink.href = p.neetcode;
        ncLink.target = '_blank';
        ncLink.rel = 'noopener';
        ncLink.innerHTML = linkIcon() + '<span>NeetCode</span>';
        utilRow.appendChild(ncLink);
      }

      card.appendChild(utilRow);
      grid.appendChild(card);
    });

    section.appendChild(grid);
    content.appendChild(section);
  });

  if(content.innerHTML === ''){
    content.innerHTML = '<p style="color:var(--text-soft); text-align:center; padding:40px 0;">No matches found.</p>';
  }
}

/* ---------------- Video Modal ---------------- */
const overlay = document.getElementById('modalOverlay');
const frame = document.getElementById('modalFrame');
const closeBtn = document.getElementById('modalClose');
const modalFallback = document.getElementById('modalFallback');
const modalSpinner = document.getElementById('modalSpinner');

frame.addEventListener('load', () => {
  if(frame.src){
    frame.classList.add('loaded');
    modalSpinner.classList.add('hidden');
  }
});

function openModal(videoId){
  const origin = encodeURIComponent(window.location.origin);
  frame.classList.remove('loaded');
  modalSpinner.classList.remove('hidden');
  frame.src = 'https://www.youtube-nocookie.com/embed/' + videoId + '?autoplay=1&rel=0&modestbranding=1&origin=' + origin;
  modalFallback.href = 'https://www.youtube.com/watch?v=' + videoId;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(){
  overlay.classList.remove('open');
  frame.src = '';
  document.body.style.overflow = '';
}
closeBtn.addEventListener('click', closeModal);
overlay.addEventListener('click', (e) => { if(e.target === overlay) closeModal(); });

/* ---------------- Notes Modal ---------------- */
const notesOverlay = document.getElementById('notesOverlay');
const notesClose = document.getElementById('notesClose');
const notesTitle = document.getElementById('notesTitle');
const notesText = document.getElementById('notesText');
const saveStatus = document.getElementById('saveStatus');
const tabText = document.getElementById('tabText');
const tabDraw = document.getElementById('tabDraw');
const paneText = document.getElementById('paneText');
const paneDraw = document.getElementById('paneDraw');
const canvas = document.getElementById('notesCanvas');
const ctx = canvas.getContext('2d');
const canvasWrap = document.getElementById('canvasWrap');
const penColor = document.getElementById('penColor');
const penSize = document.getElementById('penSize');
const toolPen = document.getElementById('toolPen');
const toolEraser = document.getElementById('toolEraser');
const toolClear = document.getElementById('toolClear');
const expandCanvas = document.getElementById('expandCanvas');

let currentNoteId = null;
let currentCard = null;
let currentH3 = null;
let currentTool = 'pen';
let drawing = false;
let saveTimer = null;

function fillWhite(){
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function openNotes(id, title, cardEl, h3El){
  currentNoteId = id;
  currentCard = cardEl;
  currentH3 = h3El;
  notesTitle.textContent = 'Notes — ' + title;
  saveStatus.textContent = 'Saved';

  // load text
  notesText.value = localStorage.getItem('dsa-note-text:' + id) || '';

  // reset canvas to default size then load drawing
  canvas.width = 740;
  canvas.height = 360;
  fillWhite();
  const savedDraw = localStorage.getItem('dsa-note-draw:' + id);
  const savedDims = localStorage.getItem('dsa-note-dims:' + id);
  if(savedDims){
    try{
      const dims = JSON.parse(savedDims);
      canvas.width = dims.w;
      canvas.height = dims.h;
      fillWhite();
    }catch(e){}
  }
  if(savedDraw){
    const img = new Image();
    img.onload = () => { ctx.drawImage(img, 0, 0); };
    img.src = savedDraw;
  }

  switchTab('text');
  notesOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeNotes(){
  notesOverlay.classList.remove('open');
  document.body.style.overflow = '';
  if(currentH3){
    currentH3.innerHTML = (hasNotes(currentNoteId) ? '<span class="note-dot" title="Has notes"></span>' : '') + '<span>' + currentH3.textContent.trim() + '</span>';
  }
}
notesClose.addEventListener('click', closeNotes);
notesOverlay.addEventListener('click', (e) => { if(e.target === notesOverlay) closeNotes(); });

function switchTab(tab){
  tabText.classList.toggle('active', tab === 'text');
  tabDraw.classList.toggle('active', tab === 'draw');
  paneText.classList.toggle('active', tab === 'text');
  paneDraw.classList.toggle('active', tab === 'draw');
}
tabText.addEventListener('click', () => switchTab('text'));
tabDraw.addEventListener('click', () => switchTab('draw'));

function markSaving(){
  saveStatus.textContent = 'Saving…';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => { saveStatus.textContent = 'Saved'; }, 500);
}

notesText.addEventListener('input', () => {
  if(!currentNoteId) return;
  markSaving();
  clearTimeout(notesText._debounce);
  notesText._debounce = setTimeout(() => {
    localStorage.setItem('dsa-note-text:' + currentNoteId, notesText.value);
  }, 400);
});

function saveDrawing(){
  if(!currentNoteId) return;
  markSaving();
  localStorage.setItem('dsa-note-draw:' + currentNoteId, canvas.toDataURL('image/png'));
  localStorage.setItem('dsa-note-dims:' + currentNoteId, JSON.stringify({w: canvas.width, h: canvas.height}));
}

function getPos(e){
  const rect = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: (clientX - rect.left) * (canvas.width / rect.width),
    y: (clientY - rect.top) * (canvas.height / rect.height)
  };
}

function startDraw(e){
  drawing = true;
  const pos = getPos(e);
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
  e.preventDefault();
}
function moveDraw(e){
  if(!drawing) return;
  const pos = getPos(e);
  ctx.lineWidth = penSize.value;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = currentTool === 'eraser' ? '#ffffff' : penColor.value;
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
  e.preventDefault();
}
function endDraw(){
  if(!drawing) return;
  drawing = false;
  saveDrawing();
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', moveDraw);
window.addEventListener('mouseup', endDraw);
canvas.addEventListener('touchstart', startDraw, {passive:false});
canvas.addEventListener('touchmove', moveDraw, {passive:false});
canvas.addEventListener('touchend', endDraw);

toolPen.addEventListener('click', () => {
  currentTool = 'pen';
  toolPen.classList.add('active');
  toolEraser.classList.remove('active');
});
toolEraser.addEventListener('click', () => {
  currentTool = 'eraser';
  toolEraser.classList.add('active');
  toolPen.classList.remove('active');
});
toolClear.addEventListener('click', () => {
  if(!confirm('Clear the entire drawing for this note?')) return;
  fillWhite();
  saveDrawing();
});

expandCanvas.addEventListener('click', () => {
  const oldW = canvas.width, oldH = canvas.height;
  const imgData = ctx.getImageData(0, 0, oldW, oldH);
  canvas.height = oldH + 260;
  fillWhite();
  ctx.putImageData(imgData, 0, 0);
  canvasWrap.scrollTop = canvasWrap.scrollHeight;
  saveDrawing();
});

/* ---------------- Search ---------------- */
document.getElementById('searchInput').addEventListener('input', (e) => render(e.target.value));

/* ---------------- Theme toggle ---------------- */
const themeToggle = document.getElementById('themeToggle');
const iconSun = document.getElementById('iconSun');
const iconMoon = document.getElementById('iconMoon');

function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  document.body.setAttribute('data-theme', theme);
  if(theme === 'dark'){
    iconSun.classList.add('hidden');
    iconMoon.classList.remove('hidden');
  } else {
    iconSun.classList.remove('hidden');
    iconMoon.classList.add('hidden');
  }
  localStorage.setItem('theme', theme);
}

themeToggle.addEventListener('click', () => {
  const current = document.body.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
  applyTheme(current === 'dark' ? 'light' : 'dark');
});

const saved = localStorage.getItem('theme') ||
  (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
applyTheme(saved);

render();
</script>
